!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ontario Workforce Priority Stream Points Calculator</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f6f9;
    margin:40px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#003366;
}

.section{
    margin-top:25px;
    padding-top:15px;
    border-top:1px solid #ddd;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

select,input{
    width:100%;
    padding:10px;
    font-size:15px;
    margin-top:5px;
}

button{
    margin-top:30px;
    width:100%;
    padding:15px;
    background:#0066cc;
    color:white;
    border:none;
    border-radius:6px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#004f99;
}

.result{
    margin-top:30px;
    background:#eef7ee;
    padding:20px;
    border-radius:8px;
    font-size:22px;
    text-align:center;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Ontario Workforce Priority Stream Calculator</h1>

<div class="section">

<label>NOC TEER</label>
<select id="teer">
<option value="9">TEER 0 or 1 (9)</option>
<option value="6">TEER 2 or 3 (6)</option>
<option value="0">TEER 4 or 5 (0)</option>
</select>

<label>NOC Broad Occupational Category</label>
<select id="category">
<option value="10">Category 3 (10)</option>
<option value="8">Category 7 (8)</option>
<option value="6">Category 2 (6)</option>
<option value="4">Category 0,1,4,8,9 (4)</option>
<option value="2">Category 5 or 6 (2)</option>
</select>

<label>Hourly Wage</label>
<select id="wage">
<option value="15">$40+ (15)</option>
<option value="12">$35-$39.99 (12)</option>
<option value="10">$30-$34.99 (10)</option>
<option value="8">$25-$29.99 (8)</option>
<option value="5">$20-$24.99 (5)</option>
<option value="0">Below $20 (0)</option>
</select>

<label>Ontario Work Experience</label>
<select id="work">
<option value="18">24+ months in job offer position (18)</option>
<option value="15">13-24 months in job offer position (15)</option>
<option value="12">6-12 months in job offer position (12)</option>
<option value="12">24+ months Ontario only (12)</option>
<option value="9">13-24 months Ontario only (9)</option>
<option value="6">6-12 months Ontario only (6)</option>
<option value="0">Less than 6 months (0)</option>
</select>

<label>Canadian Earnings History</label>
<select id="earnings">
<option value="8">$70,000+ (8)</option>
<option value="6">$50,000-$69,999 (6)</option>
<option value="4">$30,000-$49,999 (4)</option>
<option value="0">Under $30,000 (0)</option>
</select>

<label>Legal Status</label>
<select id="status">
<option value="10">Valid Work Permit (10)</option>
<option value="5">Valid Study Permit (5)</option>
<option value="0">No Valid Permit (0)</option>
</select>

<label>Highest Education</label>
<select id="education">
<option value="10">Doctorate / Medicine (10)</option>
<option value="8">Master's Degree (8)</option>
<option value="6">Graduate Certificate above Bachelor's (6)</option>
<option value="6">Bachelor's Degree (6)</option>
<option value="5">College/Certificate/Trades (5)</option>
<option value="0">Less than College (0)</option>
</select>

<label>Canadian Education Credentials</label>
<select id="credentials">
<option value="10">More than One (10)</option>
<option value="5">One (5)</option>
<option value="0">None (0)</option>
</select>

<label>Official Language (Lowest CLB)</label>
<select id="language">
<option value="15">CLB 9+ (15)</option>
<option value="12">CLB 8 (12)</option>
<option value="8">CLB 7 (8)</option>
<option value="4">CLB 6 (4)</option>
<option value="0">CLB 5 or lower (0)</option>
</select>

<label>Official Languages</label>
<select id="languages">
<option value="10">English & French (10)</option>
<option value="5">One Official Language (5)</option>
</select>

<label>Regional Immigration</label>
<select id="region">
<option value="15">Northern Ontario (15)</option>
<option value="10">Eastern Ontario (10)</option>
<option value="10">Central Ontario (10)</option>
<option value="10">Southwestern Ontario (10)</option>
<option value="5">Inside GTA (except Toronto) (5)</option>
<option value="0">Toronto (0)</option>
</select>

<button onclick="calculate()">Calculate Score</button>

<div class="result" id="result">
Total Score: 0
</div>

</div>
</div>

<script>

function value(id){
    return Number(document.getElementById(id).value);
}

function calculate(){

let total=
value("teer")+
value("category")+
value("wage")+
value("work")+
value("earnings")+
value("status")+
value("education")+
value("credentials")+
value("language")+
value("languages")+
value("region");

document.getElementById("result").innerHTML=
"Total OINP EOI Score: <br><span style='font-size:40px;color:#0066cc'>"+total+"</span>";

}

</script>

</body>
</html>
